<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Last Reading</title>
<style>
  /* Preserve the phone-style shell on narrow screens, but let the game expand
     to the full viewport on desktop so the SPv2 desktop layout can activate. */
  html,body{margin:0;height:100%;background:#030201;overflow:hidden}
  #tlr-frame{display:block;border:0;width:100%;height:100%;margin:0;box-shadow:none}
  @media (max-width: 640px){
    body{display:block}
    #tlr-frame{width:min(430px,100%);margin:0 auto;box-shadow:-2px 0 40px rgba(0,0,0,.7),2px 0 40px rgba(0,0,0,.7)}
  }
</style>
</head>
<body>
<iframe id="tlr-frame" src="game.html" title="The Last Reading" allow="autoplay"></iframe>
</body>
</html>
