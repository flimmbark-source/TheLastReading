<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Feedback</title>
</head>
<body>
  <!-- Static detection copy for Netlify Forms. The visible main-menu form is
       rendered by src/app/playerFeedback.mjs with these same named fields. -->
  <form name="player-feedback" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="player-feedback">
    <input type="text" name="bot-field">
    <textarea name="feedback"></textarea>
    <input type="email" name="email">
    <input type="text" name="source">
    <input type="text" name="page">
    <input type="text" name="mode">
    <input type="text" name="viewport">
    <input type="text" name="user-agent">
  </form>
</body>
</html>
