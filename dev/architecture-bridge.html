<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Last Reading Architecture Diagnostics</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #17110d;
      color: #f5ead7;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      border: 1px solid rgba(245, 234, 215, 0.25);
      border-radius: 18px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.55; color: rgba(245, 234, 215, 0.78); }
    button {
      border: 1px solid rgba(245, 234, 215, 0.35);
      background: rgba(245, 234, 215, 0.12);
      color: #f5ead7;
      border-radius: 999px;
      padding: 10px 16px;
      margin: 0 8px 16px 0;
      cursor: pointer;
    }
    button:hover { background: rgba(245, 234, 215, 0.2); }
    dl {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
    }
    dt { color: rgba(245, 234, 215, 0.62); }
    dd { margin: 0; }
    code {
      color: #f7d98c;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    #diagnosticsLog {
      margin-top: 16px;
      padding: 12px;
      min-height: 80px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
      color: rgba(245, 234, 215, 0.72);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Architecture Diagnostics</h1>
    <p>
      This page mounts the new architecture bridge in a browser context without touching the live game.
      Use it to verify that the store, reducer, selectors, and save bridge work before wiring them into <code>index.html</code>.
    </p>

    <button id="startReadingButton" type="button">Dispatch START_READING</button>
    <button id="uninstallBridgeButton" type="button">Uninstall bridge</button>

    <section id="diagnosticsOutput" aria-live="polite"></section>
    <section id="diagnosticsLog" aria-live="polite"></section>
  </main>

  <script type="module" src="../src/app/browserDiagnostics.mjs"></script>
</body>
</html>
