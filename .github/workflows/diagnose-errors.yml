name: Diagnose current errors

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Capture validation and smoke failures
        shell: bash
        run: |
          mkdir -p diagnostics artifacts
          set +e

          npm run lint > diagnostics/lint.log 2>&1
          lint_status=$?

          npm test > diagnostics/test.log 2>&1
          test_status=$?

          npx playwright install --with-deps chromium > diagnostics/playwright-install.log 2>&1
          browser_status=$?

          SPV2_VISUAL_REQUIRED=1 npm run test:spv2-visual > diagnostics/spv2-smoke.log 2>&1
          spv2_status=$?

          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/validate-attic3d-smoke.mjs')
          source = path.read_text()
          return_needle = "    await page.waitForFunction(() => document.body.classList.contains('mode-reading'), null, { timeout: 20000 });"
          return_replacement = """    try {
              await page.waitForFunction(() => document.body.classList.contains('mode-reading'), null, { timeout: 20000 });
            } catch (error) {
              const state = await page.evaluate(() => ({
                bodyClasses: [...document.body.classList],
                rig: window.__tlrAttic3d?.api?.getState?.() || null,
                atticMounted: window.__tlrAttic3d?.mounted ?? null,
                seatMounted: window.__tlrTableSeat?.mounted ?? null,
                atticRoot: Boolean(document.getElementById('attic3dRoot')),
                tableSeat: Boolean(document.getElementById('table3dSeat')),
                sceneAriaHidden: document.getElementById('atticScene')?.getAttribute('aria-hidden') || null,
                archivesOpen: Boolean(document.getElementById('invWrap')?.classList.contains('open')),
              }));
              console.error(`ATTIC_RETURN_STATE ${JSON.stringify(state)}`);
              throw error;
            }"""
          click_needle = "    await page.mouse.click(cardPoint.x, cardPoint.y);"
          click_replacement = """    const inspectCardHit = async label => {
              const state = await page.evaluate(({ point, label }) => {
                const describe = element => {
                  if (!element) return null;
                  const style = getComputedStyle(element);
                  const rect = element.getBoundingClientRect();
                  return {
                    tag: element.tagName.toLowerCase(),
                    id: element.id || null,
                    className: String(element.className || ''),
                    pointerEvents: style.pointerEvents,
                    position: style.position,
                    zIndex: style.zIndex,
                    display: style.display,
                    visibility: style.visibility,
                    opacity: style.opacity,
                    transform: style.transform,
                    translate: style.translate,
                    rect: { left: rect.left, top: rect.top, width: rect.width, height: rect.height },
                  };
                };
                const card = document.querySelector('#hand .card[data-uid]:last-child');
                const stack = document.elementsFromPoint(point.x, point.y).slice(0, 10).map(describe);
                return {
                  label,
                  viewport: { innerWidth, innerHeight, visualWidth: visualViewport?.width, visualHeight: visualViewport?.height },
                  point,
                  stack,
                  card: describe(card),
                  hand: describe(document.getElementById('hand')),
                  dock: describe(document.querySelector('.handDock')),
                  zone: describe(document.getElementById('handSwipeZone')),
                  lower: describe(document.querySelector('.hand-swipe-zone-lower')),
                  bodyClasses: [...document.body.classList],
                  selected: Boolean(document.querySelector('#hand .card.sel, #hand .card.ability-picked, .card-detail-trigger')),
                };
              }, { point: cardPoint, label });
              console.error(`ATTIC_CARD_HIT ${JSON.stringify(state)}`);
            };
            await inspectCardHit('before-move');
            await page.mouse.move(cardPoint.x, cardPoint.y);
            await page.waitForTimeout(250);
            await inspectCardHit('after-hover');
            await page.mouse.down();
            await page.mouse.up();
            await page.waitForTimeout(500);
            await inspectCardHit('after-click');"""
          if source.count(return_needle) != 1:
              raise SystemExit(f'expected one attic return wait, found {source.count(return_needle)}')
          if source.count(click_needle) != 1:
              raise SystemExit(f'expected one seated card click, found {source.count(click_needle)}')
          source = source.replace(return_needle, return_replacement)
          source = source.replace(click_needle, click_replacement)
          path.write_text(source)
          PY

          ATTIC3D_VISUAL_REQUIRED=1 npm run test:attic3d > diagnostics/attic3d-smoke.log 2>&1
          attic_status=$?

          printf 'lint=%s\ntest=%s\nplaywright=%s\nspv2=%s\nattic3d=%s\n' \
            "$lint_status" "$test_status" "$browser_status" "$spv2_status" "$attic_status" \
            | tee diagnostics/status.txt

          tar -czf diagnostics/repair-source.tar.gz \
            scripts src .github package.json package-lock.json eslint.config.js

          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: current-error-diagnostics
          path: |
            diagnostics/
            artifacts/
          if-no-files-found: error
          retention-days: 3
