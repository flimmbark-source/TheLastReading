name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  apply-adventure-reward-phases:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/adventure-reward-usability') ||
      (github.event_name == 'pull_request' && github.head_ref == 'adventure-reward-usability')
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0

      - name: Check whether phases are already applied
        id: phase-state
        run: |
          if [ -f docs/adventure-passive-audit.md ]; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.phase-state.outputs.applied != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Reassemble and decode source transformer
        if: steps.phase-state.outputs.applied != 'true'
        run: |
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          import json
          from pathlib import Path

          parts = []
          for index in (1, 2):
              path = Path(f'scripts/.apply-adventure-reward-phases.part{index:02d}')
              parts.append(''.join(path.read_text(encoding='utf-8').split()))
          for index in (3, 4, 5):
              path = Path(f'scripts/.apply-adventure-reward-phases.part{index:02d}.json')
              parts.append(json.loads(path.read_text(encoding='utf-8'))['data'])

          encoded = ''.join(parts)
          expected = '33870c474159518511be4edce67fcf3eeb93d5955015be65a5dbecd6d1e3bec8'
          actual = hashlib.sha256(encoded.encode('ascii')).hexdigest()
          if actual != expected:
              raise SystemExit(f'Transformer checksum mismatch: expected {expected}, got {actual}')

          compressed = base64.b64decode(encoded, validate=True)
          source = gzip.decompress(compressed)
          Path('/tmp/apply-adventure-reward-phases.mjs').write_bytes(source)
          print(f'Decoded {len(compressed)} compressed bytes into {len(source)} source bytes.')
          PY

      - name: Syntax-check source transformer
        if: steps.phase-state.outputs.applied != 'true'
        run: node --check /tmp/apply-adventure-reward-phases.mjs

      - name: Apply exact source transforms
        if: steps.phase-state.outputs.applied != 'true'
        run: node /tmp/apply-adventure-reward-phases.mjs

      - name: Install dependencies
        if: steps.phase-state.outputs.applied != 'true'
        run: npm ci

      - name: Syntax-check generated modules
        if: steps.phase-state.outputs.applied != 'true'
        run: |
          node --check src/app/adventureModeV3.mjs
          node --check src/app/adventureCardSigils.mjs
          node --check src/data/adventure/sigils.mjs
          node --check src/data/adventure/adventureContentV3.mjs
          node --check scripts/validate-adventure-reward-phases.mjs

      - name: Run Adventure phase assertions
        if: steps.phase-state.outputs.applied != 'true'
        run: node scripts/validate-adventure-reward-phases.mjs

      - name: Check generated diff
        if: steps.phase-state.outputs.applied != 'true'
        run: git diff --check

      - name: Lint generated implementation
        if: steps.phase-state.outputs.applied != 'true'
        run: npm run lint

      - name: Test generated implementation
        if: steps.phase-state.outputs.applied != 'true'
        run: npm test

      - name: Commit validated implementation and remove temporary machinery
        if: steps.phase-state.outputs.applied != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/apply-adventure-reward-phases.yml
          rm -f scripts/.apply-adventure-reward-phases.mjs.gz.b64
          rm -f scripts/.apply-adventure-reward-phases.part01 scripts/.apply-adventure-reward-phases.part02
          rm -f scripts/.apply-adventure-reward-phases.part03.json scripts/.apply-adventure-reward-phases.part04.json scripts/.apply-adventure-reward-phases.part05.json
          git add -A .github/workflows/ci.yml .github/workflows/apply-adventure-reward-phases.yml scripts/.apply-adventure-reward-phases.mjs.gz.b64
          git add -A scripts/.apply-adventure-reward-phases.part01 scripts/.apply-adventure-reward-phases.part02
          git add -A scripts/.apply-adventure-reward-phases.part03.json scripts/.apply-adventure-reward-phases.part04.json scripts/.apply-adventure-reward-phases.part05.json
          git add src/app/adventureModeV3.mjs src/app/adventureCardSigils.mjs
          git add src/data/adventure/sigils.mjs src/data/adventure/adventureContentV3.mjs
          git add scripts/validate-adventure-reward-phases.mjs docs/adventure-passive-audit.md
          git commit -m "Complete Adventure reward phases"
          git push origin HEAD:adventure-reward-usability

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  spv2-visual-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: SPV2_VISUAL_REQUIRED=1 npm run test:spv2-visual
      - name: Upload SPv2 smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spv2-visual-smoke-screenshots
          path: artifacts/spv2-smoke-*.png
          if-no-files-found: warn
          retention-days: 14
