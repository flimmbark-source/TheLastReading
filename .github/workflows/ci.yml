name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Run tests
        run: npm test > feedback-test.log 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-test-output
          path: feedback-test.log
          if-no-files-found: error
          retention-days: 1

  spv2-visual-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: SPV2_VISUAL_REQUIRED=1 npm run test:spv2-visual
      - name: Upload SPv2 smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spv2-visual-smoke-screenshots
          path: artifacts/spv2-smoke-*.png
          if-no-files-found: warn
          retention-days: 14

  attic3d-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: ATTIC3D_VISUAL_REQUIRED=1 npm run test:attic3d
      - name: Upload 3D attic smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attic3d-smoke-screenshots
          path: artifacts/attic3d-*.png
          if-no-files-found: warn
          retention-days: 14
