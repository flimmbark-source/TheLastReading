name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  fix-adventure-triumph-state:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/adventure-reward-usability') ||
      (github.event_name == 'pull_request' && github.head_ref == 'adventure-reward-usability')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Apply focused triumph-state correction
        run: node scripts/.fix-adventure-triumph-skip.mjs
      - run: node --check src/app/adventureModeV3.mjs
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Commit correction
        run: |
          if git diff --quiet -- src/app/adventureModeV3.mjs; then
            echo "Triumph-state correction is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/adventureModeV3.mjs
          git commit -m "Use reward tier for Adventure triumph state"
          git push origin HEAD:adventure-reward-usability

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  spv2-visual-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: SPV2_VISUAL_REQUIRED=1 npm run test:spv2-visual
      - name: Upload SPv2 smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spv2-visual-smoke-screenshots
          path: artifacts/spv2-smoke-*.png
          if-no-files-found: warn
          retention-days: 14
