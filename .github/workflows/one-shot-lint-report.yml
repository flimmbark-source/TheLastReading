name: One-shot lint report

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Current lint report
        run: npx eslint . || true
      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-lint-report.yml
      - name: Commit workflow removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove one-shot lint report workflow"
          git push origin HEAD:adventure-reward-usability
