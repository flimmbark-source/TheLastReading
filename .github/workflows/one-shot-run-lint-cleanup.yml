name: One-shot run lint cleanup

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/cleanup-lint-warnings.mjs
      - run: npx eslint . --fix
      - run: npm test
      - name: Record lint result
        run: |
          npx eslint . --format json > /tmp/lint.json || true
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const results=JSON.parse(fs.readFileSync('/tmp/lint.json','utf8'));
          const messages=results.flatMap(r=>r.messages.filter(m=>m.severity===1).map(m=>`${r.filePath.replace(process.cwd()+'/', '')}:${m.line}:${m.column} ${m.ruleId} ${m.message}`));
          fs.writeFileSync('lint-after.txt',`Warnings: ${messages.length}\n${messages.join('\n')}\n`);
          NODE
      - name: Remove one-shot files
        run: |
          rm .github/workflows/one-shot-run-lint-cleanup.yml
          rm scripts/cleanup-lint-warnings.mjs
          rm -f lint-context.txt
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Resolve repository lint warnings"
          git push origin HEAD:adventure-reward-usability
