name: One-shot lint autofix

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint . --fix || true
      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-lint-autofix.yml
      - name: Commit autofixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Apply ESLint autofixes"
          git push origin HEAD:adventure-reward-usability
