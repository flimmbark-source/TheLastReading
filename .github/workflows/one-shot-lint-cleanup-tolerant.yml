name: One-shot lint cleanup tolerant

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply lint cleanup
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const edit=(path,fn)=>{const before=fs.readFileSync(path,'utf8');const after=fn(before);fs.writeFileSync(path,after);};

          edit('scripts/_ab/reduceB2.mjs',s=>s.replaceAll('for (const [rel, s]','for (const [, s]'));
          edit('scripts/validate-multiplayer.mjs',s=>s.replace(/\/\/ --- Final turn triggered when spread fills ---\n\nfunction fillSpread[\s\S]*?\n}\n\n(?=\{\n  \/\/ In the simultaneous model)/,'// --- Final turn triggered when spread fills ---\n\n'));
          edit('src/app/adventureCardSigils.mjs',s=>s
            .replace("import { getEventApproaches } from '../data/adventure/eventApproaches.mjs';\n",'')
            .replace("const SVG_NS = 'http://www.w3.org/2000/svg';\n",'')
            .replace("const REQUIREMENT_SET_KEY = '__tlrAdventureRequirementSetIndex';\n",''));
          edit('src/app/adventureModeV3.mjs',s=>s.replace('  setEchoText,\n',''));
          edit('src/app/archives.mjs',s=>s
            .replace('   getUnlockedFragments, playSound, applyResonationGlows, _resStateKey */','   getUnlockedFragments, playSound, applyResonationGlows */')
            .replace('let psx,psy,esx,esy,dw,dh,iw,ih,moved=false,active=false;','let psx,psy,esx,esy,dw,dh,iw,moved=false,active=false;')
            .replace('iw=el.offsetWidth||84;ih=el.offsetHeight||100;','iw=el.offsetWidth||84;'));
          edit('src/app/atticFlow.mjs',s=>s.replace(/  function candleSpend\(\)\{[^\n]*\}\n/,''));
          edit('src/app/loadoutScreen.mjs',s=>s
            .replace("const SWITCH_CUE_FILE = 'assets/audio/soundreality-bell-fx-410608.mp3';\n",'')
            .replace('  let switchAudio = null;\n','')
            .replace(/\n  \/\/ Plays the persona-switch chime\.[\s\S]*?\n  function playSwitchCue\(\) \{[\s\S]*?\n  \}\n/,'\n'));
          edit('src/app/mainMenu.mjs',s=>s.replace(/\nfunction hasSavedProgress\(storage\) \{[\s\S]*?\n\}\n\n(?=function syncInitialRunToStore)/,'\n'));
          edit('src/app/readingFlow.mjs',s=>{
            s=s.replace(/\/\* global state,[\s\S]*?tlrScoreToObals \*\//,`/* global state, persist, TH, $, effectsUntil, _slotEls,
   _scoreLegacy, _getPlacedScore, _relicMeldNameToKey, _relicMeldNames,
   render, refreshHandState,
   ghost, bump, centerGhost, fireMultGhost, fireScoreGhost, holdEffects, fireChipProjectile,
   meldStr, normMeldName, sortCards, cleanName, choice,
   buildDeck, shuffle, drawN, slotsForMeld, playSound, haptic, meldMagnitude,
   tlrSyncPersistToStore, tlrStoreReady, tlrResolveAbilityThroughStore,
   tlrAbilityDraw, maxHand, tlrArchitectureSync */`);
            s=s.replace('const threshold=Number(_elThreshold?.textContent)||Infinity;let el=_elCurrent,start=performance.now(),dead=false,lastVal=from,popAnim=null,thCrossed=from>=threshold;','const threshold=Number(_elThreshold?.textContent)||Infinity;const el=_elCurrent,start=performance.now();let dead=false,lastVal=from,popAnim=null,thCrossed=from>=threshold;');
            s=s.replace(/\/\/ Between reveals only the ability's `count` cards[\s\S]*?\nfunction relation\([\s\S]*?\n}\n\n(?=export function checkEnd)/,'');
            s=s.replace('let cards=state.spread.filter(Boolean),res=_scoreLegacy(cards),total=res.finalScore,curTH=TH[state.th]+(state.thBonus||0),pass=total>=curTH;','const cards=state.spread.filter(Boolean);let res=_scoreLegacy(cards),total=res.finalScore,curTH=TH[state.th]+(state.thBonus||0),pass=total>=curTH;');
            s=s.replace('let needsNext=false,roundTotal=total,setNumber=(state.setIndex||0)+1,setsPerRound=state.setsPerRound||2;','let needsNext=false,roundTotal=total;');
            s=s.replace('  setNumber=(_run.setIndex||0)+1;\n','').replace('  setsPerRound=_run.setsPerRound||setsPerRound;\n','');
            return s;
          });
          edit('src/app/tutorialCore.mjs',s=>s.replace('let placementCount = 0;\n',''));
          edit('src/multiplayer/mpSelectors.mjs',s=>s.replace("import { MP_ABILITY_TYPES } from './interactionCards.mjs';\n",''));
          edit('src/ui/gestureCard.mjs',s=>s
            .replace('/* global state, refreshHandState, expandCard, render, placeCard */','/* global state, refreshHandState, expandCard, render */')
            .replace('  const HOLD_MS=400;\n','')
            .replace('  const inSelectionMode=()=>!!(gestureTargeting()||purgeSelecting()||gestureBusy());\n','')
            .replace(/\n  const restoreCardToHand=\(\)=>\{[\s\S]*?\n  \};\n\n(?=  const startSelectDrag)/,'\n'));
          edit('src/ui/gestureHand.mjs',s=>s.replace('let springRaf=null,springLastT=0,springState=new WeakMap();','let springRaf=null,springLastT=0;const springState=new WeakMap();'));
          edit('src/ui/renderMarket.mjs',s=>s.replace("const STORE_ASSET_PATH = './';\n",''));
          edit('src/ui/renderTable.mjs',s=>s.replace(/\/\* global state, persist, TH, \$, [^\n]* \*\//,'/* global state, persist, TH, $, _hintsKey, _hintsCacheKey, _hintsCache, _getPlacedScore, applyResonationGlows, _scoreLegacy, hasMull, maxHand, tlrArchitectureSync, _elThreshold, _elPool, _elDiscards, _elDiscardBtn, _elPurgeBtn, _elMullBtn */'));
          NODE
      - run: npx eslint . --fix
      - run: npm test
      - name: Write lint report
        run: |
          npx eslint . --format json > /tmp/lint.json || true
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const results=JSON.parse(fs.readFileSync('/tmp/lint.json','utf8'));
          const messages=results.flatMap(r=>r.messages.filter(m=>m.severity===1).map(m=>`${r.filePath.replace(process.cwd()+'/', '')}:${m.line}:${m.column} ${m.ruleId} ${m.message}`));
          fs.writeFileSync('lint-after.txt',`Warnings: ${messages.length}\n${messages.join('\n')}\n`);
          NODE
      - name: Remove temporary files
        run: |
          rm -f .github/workflows/one-shot-lint-cleanup.yml
          rm -f .github/workflows/one-shot-lint-cleanup-tolerant.yml
          rm -f lint-context.txt
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Resolve repository lint warnings"
          git push origin HEAD:adventure-reward-usability
