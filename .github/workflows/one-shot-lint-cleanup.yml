name: One-shot lint cleanup

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Remove remaining lint debt
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          function edit(path, transform) {
            const before = fs.readFileSync(path, 'utf8');
            const after = transform(before);
            if (after === before) throw new Error(`No change made to ${path}`);
            fs.writeFileSync(path, after);
          }
          function replace(text, from, to, label) {
            if (!text.includes(from)) throw new Error(`Missing pattern: ${label}`);
            return text.replace(from, to);
          }
          function replaceRegex(text, pattern, to, label) {
            if (!pattern.test(text)) throw new Error(`Missing regex pattern: ${label}`);
            return text.replace(pattern, to);
          }

          edit('scripts/_ab/reduceB2.mjs', text => text
            .replace('for (const [rel, s] of accepted)', 'for (const [, s] of accepted)')
            .replace('for (const [rel, s] of keptImportant)', 'for (const [, s] of keptImportant)'));

          edit('scripts/validate-multiplayer.mjs', text => replaceRegex(
            text,
            /\/\/ --- Final turn triggered when spread fills ---\n\nfunction fillSpread[\s\S]*?\n}\n\n(?=\{\n  \/\/ In the simultaneous model)/,
            '// --- Final turn triggered when spread fills ---\n\n',
            'unused fillSpread helper'
          ));

          edit('src/app/adventureCardSigils.mjs', text => text
            .replace("import { getEventApproaches } from '../data/adventure/eventApproaches.mjs';\n", '')
            .replace("const SVG_NS = 'http://www.w3.org/2000/svg';\n", '')
            .replace("const REQUIREMENT_SET_KEY = '__tlrAdventureRequirementSetIndex';\n", ''));

          edit('src/app/adventureModeV3.mjs', text => replace(text, '  setEchoText,\n', '', 'setEchoText import'));

          edit('src/app/archives.mjs', text => text
            .replace('   getUnlockedFragments, playSound, applyResonationGlows, _resStateKey */', '   getUnlockedFragments, playSound, applyResonationGlows */')
            .replace('let psx,psy,esx,esy,dw,dh,iw,ih,moved=false,active=false;', 'let psx,psy,esx,esy,dw,dh,iw,moved=false,active=false;')
            .replace('iw=el.offsetWidth||84;ih=el.offsetHeight||100;', 'iw=el.offsetWidth||84;'));

          edit('src/app/atticFlow.mjs', text => replaceRegex(
            text,
            /  function candleSpend\(\)\{[^\n]*\}\n/,
            '',
            'unused candleSpend helper'
          ));

          edit('src/app/loadoutScreen.mjs', text => {
            text = text.replace("const SWITCH_CUE_FILE = 'assets/audio/soundreality-bell-fx-410608.mp3';\n", '');
            text = text.replace('  let switchAudio = null;\n', '');
            return replaceRegex(
              text,
              /\n  \/\/ Plays the persona-switch chime\.[\s\S]*?\n  function playSwitchCue\(\) \{[\s\S]*?\n  \}\n/,
              '\n',
              'unused persona switch audio helper'
            );
          });

          edit('src/app/mainMenu.mjs', text => replaceRegex(
            text,
            /\nfunction hasSavedProgress\(storage\) \{[\s\S]*?\n\}\n\n(?=function syncInitialRunToStore)/,
            '\n',
            'unused saved-progress helper'
          ));

          edit('src/app/readingFlow.mjs', text => {
            text = replaceRegex(
              text,
              /\/\* global state,[\s\S]*?tlrScoreToObals \*\//,
              `/* global state, persist, TH, $, effectsUntil, _slotEls,
   _scoreLegacy, _getPlacedScore, _relicMeldNameToKey, _relicMeldNames,
   render, refreshHandState,
   ghost, bump, centerGhost, fireMultGhost, fireScoreGhost, holdEffects, fireChipProjectile,
   meldStr, normMeldName, sortCards, cleanName, choice,
   buildDeck, shuffle, drawN, slotsForMeld, playSound, haptic, meldMagnitude,
   tlrSyncPersistToStore, tlrStoreReady, tlrResolveAbilityThroughStore,
   tlrAbilityDraw, maxHand, tlrArchitectureSync */`,
              'readingFlow global declaration'
            );
            text = replace(
              text,
              'const threshold=Number(_elThreshold?.textContent)||Infinity;let el=_elCurrent,start=performance.now(),dead=false,lastVal=from,popAnim=null,thCrossed=from>=threshold;',
              'const threshold=Number(_elThreshold?.textContent)||Infinity;const el=_elCurrent,start=performance.now();let dead=false,lastVal=from,popAnim=null,thCrossed=from>=threshold;',
              'rollCounter mixed declaration'
            );
            text = replaceRegex(
              text,
              /\/\/ Between reveals only the ability's `count` cards[\s\S]*?\nfunction relation\([\s\S]*?\n}\n\n(?=export function checkEnd)/,
              '',
              'obsolete ability helpers'
            );
            text = replace(
              text,
              'let cards=state.spread.filter(Boolean),res=_scoreLegacy(cards),total=res.finalScore,curTH=TH[state.th]+(state.thBonus||0),pass=total>=curTH;',
              'const cards=state.spread.filter(Boolean);let res=_scoreLegacy(cards),total=res.finalScore,curTH=TH[state.th]+(state.thBonus||0),pass=total>=curTH;',
              'score cards declaration'
            );
            text = replace(
              text,
              'let needsNext=false,roundTotal=total,setNumber=(state.setIndex||0)+1,setsPerRound=state.setsPerRound||2;',
              'let needsNext=false,roundTotal=total;',
              'unused score summary variables'
            );
            text = text.replace('  setNumber=(_run.setIndex||0)+1;\n', '');
            text = text.replace('  setsPerRound=_run.setsPerRound||setsPerRound;\n', '');
            return text;
          });

          edit('src/app/tutorialCore.mjs', text => replace(text, 'let placementCount = 0;\n', '', 'unused placement count'));
          edit('src/multiplayer/mpSelectors.mjs', text => replace(text, "import { MP_ABILITY_TYPES } from './interactionCards.mjs';\n", '', 'unused multiplayer ability import'));

          edit('src/ui/gestureCard.mjs', text => {
            text = text.replace('/* global state, refreshHandState, expandCard, render, placeCard */', '/* global state, refreshHandState, expandCard, render */');
            text = text.replace('  const HOLD_MS=400;\n', '');
            text = text.replace('  const inSelectionMode=()=>!!(gestureTargeting()||purgeSelecting()||gestureBusy());\n', '');
            return replaceRegex(
              text,
              /\n  const restoreCardToHand=\(\)=>\{[\s\S]*?\n  \};\n\n(?=  const startSelectDrag)/,
              '\n',
              'unused card restore helper'
            );
          });

          edit('src/ui/gestureHand.mjs', text => replace(
            text,
            'let springRaf=null,springLastT=0,springState=new WeakMap();',
            'let springRaf=null,springLastT=0;const springState=new WeakMap();',
            'spring state declaration'
          ));

          edit('src/ui/renderMarket.mjs', text => replace(text, "const STORE_ASSET_PATH = './';\n", '', 'unused store asset path'));

          edit('src/ui/renderTable.mjs', text => replaceRegex(
            text,
            /\/\* global state, persist, TH, \$, [^\n]* \*\//,
            '/* global state, persist, TH, $, _hintsKey, _hintsCacheKey, _hintsCache, _getPlacedScore, applyResonationGlows, _scoreLegacy, hasMull, maxHand, tlrArchitectureSync, _elThreshold, _elPool, _elDiscards, _elDiscardBtn, _elPurgeBtn, _elMullBtn */',
            'renderTable global declaration'
          ));
          NODE
      - run: npx eslint . --fix
      - run: npm test
      - name: Write remaining warning report
        run: |
          npx eslint . --format json > /tmp/lint.json || true
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const results=JSON.parse(fs.readFileSync('/tmp/lint.json','utf8'));
          const messages=results.flatMap(r=>r.messages.filter(m=>m.severity===1).map(m=>`${r.filePath.replace(process.cwd()+'/', '')}:${m.line}:${m.column} ${m.ruleId} ${m.message}`));
          fs.writeFileSync('lint-after.txt',`Warnings: ${messages.length}\n${messages.join('\n')}\n`);
          NODE
      - name: Remove temporary files
        run: |
          rm .github/workflows/one-shot-lint-cleanup.yml
          rm -f lint-context.txt
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Resolve repository lint warnings"
          git push origin HEAD:adventure-reward-usability
