name: One-shot lint context

on:
  push:
    branches:
      - adventure-reward-usability

permissions:
  contents: write

jobs:
  context:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: adventure-reward-usability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build lint context report
        run: |
          npx eslint . --format json > /tmp/lint.json || true
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const results=JSON.parse(fs.readFileSync('/tmp/lint.json','utf8'));
          const out=[];
          let count=0;
          for(const result of results){
            if(!result.messages.length)continue;
            const rel=result.filePath.replace(process.cwd()+'/', '');
            const lines=fs.readFileSync(result.filePath,'utf8').split(/\r?\n/);
            for(const message of result.messages){
              if(message.severity!==1)continue;
              count++;
              const from=Math.max(1,message.line-1);
              const to=Math.min(lines.length,message.line+1);
              out.push(`### ${rel}:${message.line}:${message.column} ${message.ruleId}`);
              out.push(message.message);
              for(let line=from;line<=to;line++)out.push(`${String(line).padStart(4)} | ${lines[line-1]}`);
              out.push('');
            }
          }
          out.unshift(`Warnings: ${count}`,'');
          fs.writeFileSync('lint-context.txt',out.join('\n'));
          NODE
      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-lint-context.yml
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add current lint warning context report"
          git push origin HEAD:adventure-reward-usability
