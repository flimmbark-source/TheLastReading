<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>The Last Reading — Phase 1 Wireframe</title>
<style>
:root{
  --bg:#100b08;
  --panel:#17110e;
  --panel-2:#211812;
  --gold:#b78b43;
  --gold-bright:#f0cb78;
  --purple:#8f74d9;
  --ink:#f2e5c8;
  --muted:#a99878;
  --safe:10px;
  --title-h:40px;
  --hud-h:112px;
  --hand-h:166px;
  --rail-h:72px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#080604;color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif}
body{display:grid;place-items:center;padding:18px}
.phone{
  position:relative;
  width:min(390px,100vw);
  height:min(844px,100dvh);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 44%,rgba(148,91,29,.12),transparent 38%),
    linear-gradient(#100c09,#090605 78%);
  border:1px solid #3b2a17;
  box-shadow:0 24px 80px #000;
}
.title{
  position:absolute;z-index:6;left:0;right:0;top:0;height:var(--title-h);
  display:grid;place-items:center;color:#b99a61;font:700 20px Georgia,serif;letter-spacing:.08em;
}
.hud{
  position:absolute;z-index:25;left:var(--safe);right:var(--safe);top:var(--title-h);height:var(--hud-h);
  display:grid;grid-template-columns:21fr 29fr 29fr 21fr;
  border:1px solid var(--gold);border-radius:18px;background:#0d0b0a;overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,.55);
}
.hud-panel{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;border-right:1px solid rgba(183,139,67,.38);padding:8px 3px}
.hud-panel:last-child{border-right:0}
.hud-panel.score{background:radial-gradient(circle at 50% 75%,rgba(201,143,45,.24),transparent 68%)}
.hud-panel.threshold{background:radial-gradient(circle at 50% 75%,rgba(113,81,190,.28),transparent 68%)}
.label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#c4aa78;white-space:nowrap}
.value{font-variant-numeric:tabular-nums;font-weight:800;line-height:1;margin-top:6px;font-size:26px}
.score .value,.threshold .value{font-size:31px}
.score .value{color:#ffd98c}.threshold .value{color:#cbbcff}
.pips{display:flex;gap:4px;margin-top:9px}.pip{width:7px;height:7px;border-radius:50%;border:1px solid #6e5b3e}.pip.on{background:#eebd4f;box-shadow:0 0 7px #eebd4f}
.progress{width:78%;height:7px;margin-top:10px;border:1px solid #705da4;border-radius:999px;overflow:hidden;background:#17111e}.progress>span{display:block;width:62%;height:100%;background:#8f74d9}
.discard-marks{display:flex;gap:5px;margin-top:8px;color:#de5959;font-weight:900}
.utility{position:absolute;z-index:20;top:164px;width:44px;height:44px;border-radius:50%;border:1px solid var(--gold);background:#17110e;color:var(--gold-bright);display:grid;place-items:center;font-size:20px}.utility.left{left:14px}.utility.right{right:14px}
.reading-field{position:absolute;z-index:10;left:0;right:0;top:198px;bottom:286px;display:grid;place-items:center}
.circle{position:absolute;width:min(86vw,330px);aspect-ratio:1;border:1px solid rgba(183,139,67,.28);border-radius:50%;box-shadow:inset 0 0 0 18px rgba(183,139,67,.025)}
.circle:before,.circle:after{content:"";position:absolute;inset:18%;border:1px solid rgba(183,139,67,.17);border-radius:50%}.circle:after{inset:36%;border-style:dashed}
.spread{position:relative;z-index:14;width:100%;display:flex;justify-content:center;align-items:flex-start;padding:0 7px}
.slot{width:72px;height:108px;flex:0 0 72px;margin-left:-2px;border:1px solid #76592f;border-radius:6px;background:linear-gradient(#16110e,#0c0907);box-shadow:0 7px 18px rgba(0,0,0,.6),inset 0 0 0 3px rgba(183,139,67,.06);position:relative}
.slot:first-child{margin-left:0}.slot:after{content:"✦";position:absolute;inset:0;display:grid;place-items:center;color:#5e4929;font-size:22px}
.slot:nth-child(1){transform:translateY(10px) rotate(-4deg)}
.slot:nth-child(2){transform:translateY(3px) rotate(-2deg)}
.slot:nth-child(3){transform:translateY(0)}
.slot:nth-child(4){transform:translateY(3px) rotate(2deg)}
.slot:nth-child(5){transform:translateY(10px) rotate(4deg)}
.hand-dock{position:absolute;z-index:26;left:0;right:0;bottom:0;height:var(--hand-h);display:flex;justify-content:center;align-items:flex-end;padding-bottom:42px;pointer-events:none;background:linear-gradient(transparent,rgba(0,0,0,.72))}
.hand{height:150px;width:100%;display:flex;justify-content:center;align-items:flex-end;pointer-events:auto}
.card{width:100px;height:150px;flex:0 0 100px;margin-left:-52px;border:1px solid #9b7137;border-radius:7px;background:linear-gradient(160deg,#2a1b12,#0f0a07);box-shadow:0 8px 22px #000;transform-origin:50% 130%;position:relative}.card:first-child{margin-left:0}
.card:after{content:attr(data-n);position:absolute;inset:7px;border:1px solid rgba(240,203,120,.35);display:grid;place-items:center;color:#cba963;font:700 24px Georgia,serif}
.card:nth-child(1){transform:rotate(-12deg) translateY(13px)}.card:nth-child(2){transform:rotate(-6deg) translateY(4px)}.card:nth-child(3){transform:translateY(-5px)}.card:nth-child(4){transform:rotate(6deg) translateY(4px)}.card:nth-child(5){transform:rotate(12deg) translateY(13px)}
.action-rail{position:absolute;z-index:24;left:0;right:0;bottom:0;height:var(--rail-h);display:flex;justify-content:space-between;align-items:flex-end;padding:0 24px 8px;pointer-events:none}
.action{pointer-events:auto;border:1px solid var(--gold);background:#15100d;color:#d8b971;border-radius:50%;width:48px;height:48px;display:grid;place-items:center;font-size:20px;position:relative}.action.primary{width:58px;height:58px;font-size:26px;box-shadow:0 0 18px rgba(232,182,69,.24)}
.badge{position:absolute;right:-4px;top:-7px;width:22px;height:22px;border-radius:50%;background:#6544a8;color:white;display:grid;place-items:center;font-size:11px;border:1px solid #ae8ae7}
.notes{position:absolute;z-index:100;left:8px;bottom:8px;font-size:9px;color:#6e614e;pointer-events:none}
@media(max-width:374px){
  :root{--safe:7px;--hud-h:100px;--title-h:34px;--hand-h:154px}
  .score .value,.threshold .value{font-size:27px}.value{font-size:23px}.label{font-size:9px}
  .utility{top:142px}.reading-field{top:176px;bottom:268px}
  .slot{width:66px;height:99px;flex-basis:66px;margin-left:-3px}
  .card{width:94px;height:141px;flex-basis:94px;margin-left:-50px}
}
@media(max-height:759px){
  :root{--title-h:32px;--hud-h:94px;--hand-h:146px;--rail-h:62px}
  .utility{top:132px}.reading-field{top:172px;bottom:238px}
  .slot{width:66px;height:99px;flex-basis:66px}
  .card{height:138px;width:92px;flex-basis:92px;margin-left:-48px}
}
</style>
</head>
<body>
<main class="phone" aria-label="Phase 1 single-player layout wireframe">
  <header class="title">THE LAST READING</header>
  <section class="hud" aria-label="Primary game status">
    <div class="hud-panel reserve"><span class="label">Reserve</span><strong class="value">23</strong><div class="pips"><i class="pip on"></i><i class="pip on"></i><i class="pip on"></i><i class="pip"></i></div></div>
    <div class="hud-panel score"><span class="label">Score</span><strong class="value">1,240</strong></div>
    <div class="hud-panel threshold"><span class="label">Threshold</span><strong class="value">2,000</strong><div class="progress"><span></span></div></div>
    <div class="hud-panel discards"><span class="label">Discards</span><strong class="value">2</strong><div class="discard-marks">× × ○</div></div>
  </section>
  <button class="utility left" aria-label="Reference">◫</button>
  <button class="utility right" aria-label="Settings">⚙</button>
  <section class="reading-field" aria-label="Five-card reading spread">
    <div class="circle"></div>
    <div class="spread">
      <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
  </section>
  <nav class="action-rail" aria-label="Actions">
    <button class="action">◉<span class="badge">3</span></button>
    <button class="action primary">✦</button>
    <button class="action">▣<span class="badge">5</span></button>
  </nav>
  <section class="hand-dock" aria-label="Player hand">
    <div class="hand"><div class="card" data-n="XVIII"></div><div class="card" data-n="XIII"></div><div class="card" data-n="XIX"></div><div class="card" data-n="II"></div><div class="card" data-n="VII"></div></div>
  </section>
  <small class="notes">Phase 1 placeholder art. All labels and values are live DOM.</small>
</main>
</body>
</html>
